  - {t: oO, h: ⌃, type: high}
  - {t: yY, h: ⎇, type: medium}
  - {t: wW, h: ⇧, type: medium}
  - {t: rR, h: ⇧, type: high}
  - {t: ⌫, h: ⇧}
  - ⇧
  - {t: ⎵R, h: Num+Nav, type: high}
