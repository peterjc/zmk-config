  - →
  - {h: 半濁音, left: な, right: 。}
  - {left: ん, right: む}
  - {left: ら, right: わ}
  - {left: れ}
  - {t: ⎵, h: Kana-Shift, type: kshift}
  - ⌫
  - {t: ⏎, h: Kana-Shift, type: kshift}
  - {t: ⇧⎵, h: Num + Nav}
  Num + Nav:
  - /
  - '1'
  - '2'
  - '3'
  - '='
  - ⎋
  - ⌫
  - ↑
  - _
  - ⏯
  - {t: '*', h: ⇧}
  - {t: '4', h: ⎇}
  - {t: '5', h: ⌃}
  - {t: '6', h: ⌘}
  - +
  - ⇞
  - ←
  - ↓
  - →
  - {t: 'VOL

      UP', h: ⇧}
  - {t: ., h: ⇧}
  - {t: '7', h: ⎇}
  - {t: '8', h: ⌃}
  - {t: '9', h: ⌘}
  - '-'
  - ⇟
  - ↞
  - ⏎
  - ↠
  - {t: 'VOL

      DOWN', h: ⇧}
  - {t: '0', h: ⇧}
  - {t: ▽, type: trans}
  - {t: ▽, type: trans}
  - {type: held}
