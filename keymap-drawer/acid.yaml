  - {t: mM, type: medium}
  - {t: xX, type: low}
  - {t: '/?', type: low}
  - ⌫
  - {t: '''"', type: medium-low}
  - {t: -_, type: medium-low}
  - {t: =+, type: low}
  - {t: sS, h: ⇧, type: high}
  - {t: nN, h: ⎇, type: high}
  - {t: tT, h: ⌃, type: high}
  - {t: hH, h: ⌘, type: high}
  - {t: kK, type: low}
  - {t: '.:', type: medium-low}
  - {t: aA, h: ⌘, type: high}
  - {t: eE, h: ⌃, type: high}
  - {t: iI, h: ⎇, type: high}
  - {t: cC, h: ⇧, type: medium}
  - {t: bB, h: ⇧, type: medium-low}
  - {t: fF, h: ⎇, type: medium}
  - {t: dD, h: ⌃, type: medium-high}
  - {t: lL, h: ⌘, type: medium-high}
  - {t: jJ, type: low}
