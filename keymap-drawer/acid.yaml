  - {left: と, right: に}
  - {h: 濁音, left: か, right: ま}
  - {left: っ, right: ち}
  - {left: く, right: や}
  - {h: 濁音, left: あ, right: の}
  - {left: い, right: も}
  - {left: う, right: つ}
  - {left: ー, right: ふ}
  - {left: ほ}
  - {left: ひ}
  - {left: は, right: を}
  - {h: 半濁音, left: こ, right: 、}
